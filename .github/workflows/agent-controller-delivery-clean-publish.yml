name: Publish clean controller delivery implementation

on:
  push:
    branches:
      - agent/controller-delivery-complete-20260718
    paths:
      - '.github/workflows/agent-controller-delivery-clean-publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  statuses: write
  pull-requests: write

concurrency:
  group: controller-delivery-clean-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-clean:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reconstruct and apply implementation patch
        shell: bash
        run: |
          set -euo pipefail

          output=/tmp/controller-delivery.patch
          parts=/tmp/controller-delivery-parts
          rm -rf "$parts" "$output"
          mkdir -p "$parts"

          cp .agent/controller-delivery-patch/*.patch "$parts"/ 2>/dev/null || true
          for encoded in .agent/controller-delivery-patch/*.b64; do
            [[ -e "$encoded" ]] || continue
            decoded="$parts/$(basename "${encoded%.b64}").patch"
            base64 --decode "$encoded" > "$decoded"
          done

          python <<'PY'
          from pathlib import Path

          root = Path('/tmp/controller-delivery-parts')

          p = root / 'part-07.patch'
          if p.exists():
              source = p.read_text()
              source = source.replace(
                  '.regex(/^(W\\/)?”[^”]+”$/u);',
                  '.regex(/^(W\\/)?"[^"]+"$/u);',
              )
              p.write_text(source)

          def strip_extra_plus(name: str, marker: str) -> None:
              p = root / name
              if not p.exists():
                  return
              lines = p.read_text().splitlines(keepends=True)
              active = False
              output: list[str] = []
              for line in lines:
                  if line.startswith(marker):
                      active = True
                  if active and line.startswith('+'):
                      line = line[1:]
                  output.append(line)
              p.write_text(''.join(output))

          strip_extra_plus('part-10.patch', '+diff --git a/package.json b/package.json')
          strip_extra_plus(
              'part-11.patch',
              '+diff --git a/packages/forge/src/delivery/generator.ts b/packages/forge/src/delivery/generator.ts',
          )
          PY

          find "$parts" -maxdepth 1 -type f -name 'part-*.patch' -print0 \
            | sort -z \
            | xargs -0 cat > "$output"

          test -s "$output"
          echo "Reconstructed patch SHA-256: $(sha256sum "$output" | awk '{print $1}')"
          git apply --check "$output"
          git apply "$output"

      - name: Apply final review corrections
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          root = Path('.')

          for rel in [
              'packages/forge/src/delivery/render.ts',
              'packages/forge/src/delivery/types.ts',
          ]:
              path = root / rel
              if path.exists():
                  path.write_text(''.join(
                      line for line in path.read_text().splitlines(keepends=True)
                      if 'DocumentationCommandError' not in line
                  ))

          path = root / 'packages/forge/tests/delivery.test.ts'
          if path.exists():
              seen: set[str] = set()
              output: list[str] = []
              for line in path.read_text().splitlines(keepends=True):
                  if line.startswith('import ') and line.rstrip().endswith(';'):
                      if line in seen:
                          continue
                      seen.add(line)
                  output.append(line)
              path.write_text(''.join(output))

          path = root / 'apps/reference/tests/unit/modules/demo/lucky-number/lucky-number.actions.test.ts'
          if path.exists():
              source = path.read_text().replace(
                  "const headersMock = vi.fn();\nvi.mock('next/headers', () => ({ headers: headersMock }));",
                  "const { headersMock } = vi.hoisted(() => ({ headersMock: vi.fn() }));\nvi.mock('next/headers', () => ({ headers: headersMock }));",
              )
              path.write_text(source)

          path = root / 'apps/reference/src/modules/demo/lucky-number/presentation/lucky-number.action-state.ts'
          if path.exists():
              path.write_text(path.read_text().replace(
                  'fieldErrors?: Readonly<Record<string, readonly string[]>>;',
                  'fieldErrors?: Readonly<Partial<Record<string, readonly string[]>>>;',
              ))

          old_actor = root / 'apps/reference/src/platform/auth/get-demo-actor.server.ts'
          new_actor = root / 'apps/reference/src/modules/demo/lucky-number/presentation/lucky-number.actor.server.ts'
          if old_actor.exists():
              new_actor.parent.mkdir(parents=True, exist_ok=True)
              new_actor.write_text("""import 'server-only';

          import { headers } from 'next/headers';

          import type { LuckyNumberActor } from '../application/policies/lucky-number.policy';

          export async function getDemoActor(): Promise<LuckyNumberActor> {
            const incomingHeaders = await headers();
            const roleHeader = incomingHeaders.get('x-demo-role') ?? '';
            return Object.freeze({
              subject: incomingHeaders.get('x-demo-subject'),
              roles: Object.freeze(roleHeader.split(',').map((role) => role.trim()).filter(Boolean)),
            });
          }
          """.replace('          ', ''))
              old_actor.unlink()

          action = root / 'apps/reference/src/modules/demo/lucky-number/presentation/lucky-number.actions.ts'
          if action.exists():
              action.write_text(action.read_text().replace(
                  "import { getDemoActor } from '@/platform/auth/get-demo-actor.server';\n\n",
                  "import { getDemoActor } from './lucky-number.actor.server';\n",
              ))

          route = root / 'apps/reference/src/app/api/lucky/number/route.ts'
          if route.exists():
              block = """  if (!demoModule.policies.luckyNumber.canGenerateCustomRange(actor)) {
            return problem({
              type: 'https://winzard.invalid/problems/forbidden',
              title: 'Forbidden',
              status: 403,
              code: 'FORBIDDEN',
              detail: 'Az egyedi tartomány operator szerepkört igényel.',
            });
          }

          """.replace('          ', '')
              route.write_text(route.read_text().replace(block, ''))

          document = root / 'docs/public_documentation/winzard-controller.md'
          if document.exists():
              source = document.read_text().replace(
                  '.regex(/^(W\\/)?”[^”]+”$/u);',
                  '.regex(/^(W\\/)?"[^"]+"$/u);',
              )
              source = source.replace(
                  '2026-07-17\n```\n\nA Next.js request API-k',
                  '2026-07-18\n```\n\nA Next.js request API-k',
              )
              document.write_text(source)
          PY

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate delivery contracts
        run: pnpm forge http:contracts --project apps/reference

      - name: Apply safe lint fixes
        run: pnpm lint --fix

      - name: Run complete core verification
        run: pnpm verify:core

      - name: Publish one clean commit
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .agent
          rm -f .github/workflows/agent-controller-delivery-apply.yml
          rm -f .github/workflows/agent-controller-delivery-finalize.yml
          rm -f .github/workflows/agent-controller-delivery-publish.yml
          rm -f .github/workflows/agent-controller-delivery-publish-v2.yml
          rm -f .github/workflows/agent-controller-delivery-clean-publish.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check

          tree="$(git write-tree)"
          parent="$(git rev-parse origin/main)"
          commit="$(printf '%s\n' 'feat: implement controller and delivery platform' | git commit-tree "$tree" -p "$parent")"
          git push --force origin "$commit:${GITHUB_REF_NAME}"
          echo "sha=$commit" >> "$GITHUB_OUTPUT"

      - name: Record verification and ready the PR
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.publish.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${FINAL_SHA}" \
            -f state='success' \
            -f context='controller-delivery/verify-core' \
            -f description='pnpm verify:core passed on the clean published tree' \
            -f target_url="$target_url"

          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$GITHUB_REF_NAME" --base main --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" --body "## Summary

- adds the controller and delivery specification and README index
- implements Forge delivery inventory, architecture checks, generated contract documentation, generators, and CLI commands
- extends the reference application with an application command, Server Action, explicit presenter, Problem Details responses, and tests
- adds the \`verify:delivery\` CI gate

## Validation

- \`pnpm verify:core\`
- delivery contract generation and drift checks
- reference application build and production E2E smoke tests

The branch contains only the final implementation files; temporary patch payloads and publication workflows were removed before the clean commit was created."
            gh pr ready "$pr_number" --repo "$GITHUB_REPOSITORY" || true
          fi
