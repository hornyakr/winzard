name: Apply event platform

on:
  push:
    branches:
      - agent/event-dispatching-platform

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Reconstruct implementation payload
        shell: bash
        run: |
          cat tools/event-platform.payload.* | base64 -d | gzip -d > tools/apply-event-platform.mjs
          mkdir -p docs/public_documentation
          cat tools/event-doc.payload.* | base64 -d | gzip -d > docs/public_documentation/winzard-event-dispatcher.md
          node --check tools/apply-event-platform.mjs
          test "$(sha256sum docs/public_documentation/winzard-event-dispatcher.md | cut -d' ' -f1)" = "5b61c765e1792c92ba920fba5cbf7165f7cef243d17c53ac0e7645c4a4786b0a"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply implementation
        run: node tools/apply-event-platform.mjs

      - name: Keep template registries empty by default
        shell: bash
        run: |
          for target in templates/minimal templates/webapp; do
            cat > "$target/src/composition/application.event.definition.ts" <<'EOF'
          import { defineEvents } from '@/platform/events/contract';

          export const applicationEvents = defineEvents({
            schemaVersion: 1,
            id: 'application.events',
            events: [],
          });
          EOF
          done

      - name: Generate event artifacts
        run: |
          pnpm forge event:generate --project apps/reference
          pnpm forge event:docs --project apps/reference
          pnpm forge event:generate --project templates/minimal
          pnpm forge event:docs --project templates/minimal
          pnpm forge event:generate --project templates/webapp
          pnpm forge event:docs --project templates/webapp

      - name: Run event platform checks
        run: |
          pnpm vitest run packages/forge/tests/events.test.ts
          pnpm typecheck

      - name: Remove staging payloads
        run: rm -f tools/event-platform.payload.* tools/event-doc.payload.*

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: implement event dispatching platform"
          git push
