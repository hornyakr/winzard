name: Apply Final Stage 3 Evidence Sync

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-final-stage3-evidence-sync.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Update verification documents
        shell: python
        run: |
          from pathlib import Path

          public = Path('docs/public_documentation/winzard-service-container.md')
          text = public.read_text()
          text = text.replace('status: "implemented-unverified"', 'status: "implemented-verified"', 1)
          public.write_text(text)

          development = Path('docs/development/service-composition-platform-implementation.md')
          text = development.read_text()
          old = '''The implementation and tests are authored in the development phase. The full
repository, template, database, build, E2E, runtime-security and reproducibility
gates run in the separate testing-and-repair phase before merge.'''
          new = '''The complete Stage 3 verification matrix passed on 2026-07-22. Type generation,
strict type-checking, lint, 174 unit tests, documentation and Forge contract gates,
minimal and webapp template builds, reference production build and E2E, PostgreSQL
migration deployment, read-only runtime security and canonical two-build
reproducibility all completed successfully. The result is recorded in
`docs/development/service-composition-verification.md` and
`WZ-EVIDENCE-COMPOSITION-001`. No merge to `main` occurred during verification.'''
          if old in text:
              text = text.replace(old, new, 1)
          development.write_text(text)
      - run: pnpm install --frozen-lockfile
      - name: Synchronize consumer evidence
        run: |
          project=packages/forge/tests/fixtures/documented-project
          pnpm forge docs:sync --project "$project"
          pnpm forge docs:adapters --project "$project"
          pnpm forge docs:generate --project "$project"
          pnpm forge context:build ATLAS-TASK-0001 --project "$project"
      - name: Verify documentation integrity
        run: |
          pnpm vitest run packages/forge/tests/documentation.test.ts
          pnpm verify:documentation
      - name: Commit synchronized evidence
        run: |
          rm -f .github/workflows/apply-final-stage3-evidence-sync.yml
          rm -f .github/workflows/finalize-stage3-composition-evidence.yml
          rm -f tools/stage3-evidence-finalization-failure.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs: synchronize final service composition evidence"
          git push origin HEAD:agent/service-composition-platform
