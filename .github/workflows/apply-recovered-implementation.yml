name: Apply recovered project documentation implementation

on:
  push:
    branches:
      - agent/project-documentation-implementation
    paths:
      - .github/workflows/apply-recovered-implementation.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reconstruct and verify recovered source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .winzard-recovery/chunk-* | base64 --decode > /tmp/winzard-doc-impl.tar.xz
          echo '32412a003d6868515b9813590e73f9738ef38c3424b6d8538f890ccf53c5903e  /tmp/winzard-doc-impl.tar.xz' | sha256sum --check --strict
          tar -xJf /tmp/winzard-doc-impl.tar.xz -C "$GITHUB_WORKSPACE"

      - name: Commit recovered implementation and remove transport files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .winzard-recovery
          rm -f .github/workflows/apply-recovered-implementation.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: implement project documentation and AI delivery'
          git push origin "HEAD:${GITHUB_REF_NAME}"
