name: Apply service composition contract finalization

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-service-composition-contract-finalization.yml
      - tools/finalize-service-composition-contract.py
      - tools/repair-service-composition-finalizer.py

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Finalize composition contract and CLI integration
        shell: bash
        run: |
          rm -f tools/service-composition-contract-error.log
          python tools/repair-service-composition-finalizer.py
          set +e
          python tools/finalize-service-composition-contract.py > /tmp/service-composition-contract.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/service-composition-contract.log tools/service-composition-contract-error.log
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add tools/service-composition-contract-error.log
            git commit -m "chore: capture composition contract finalization failure"
            git push origin HEAD:agent/service-composition-platform
            cat /tmp/service-composition-contract.log
            exit "$status"
          fi
          rm -f tools/repair-service-composition-finalizer.py

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate and structurally validate composition artifacts
        shell: bash
        run: |
          commands="$(pnpm --silent forge list)"
          for command in composition:list composition:inspect composition:graph composition:check composition:why composition:docs composition:generate service:aliases service:lifetimes; do
            printf '%s\n' "$commands" | grep -Fx "$command"
          done
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge composition:generate --project "$project"
            pnpm forge composition:docs --project "$project"
            pnpm forge composition:generate --check --project "$project"
            pnpm forge composition:check --resolve-config --project "$project"
            pnpm forge composition:docs --check --project "$project"
          done
          pnpm forge composition:why GetLuckyNumber --project apps/reference

      - name: Commit finalized development result
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: finalize service composition contracts and CLI discovery"
          git push origin HEAD:agent/service-composition-platform
