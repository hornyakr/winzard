name: Apply service composition development fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-service-composition-fix.yml
      - tools/fix-service-composition.py

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Apply composition source correction
        run: python tools/fix-service-composition.py

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate and structurally validate composition artifacts
        shell: bash
        run: |
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge composition:generate --project "$project"
            pnpm forge composition:docs --project "$project"
            pnpm forge composition:generate --check --project "$project"
            pnpm forge composition:check --resolve-config --project "$project"
            pnpm forge composition:docs --check --project "$project"
          done

      - name: Commit corrected development result
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: harden service composition graph validation"
          git push origin HEAD:agent/service-composition-platform
