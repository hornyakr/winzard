name: Apply service composition development

on:
  push:
    branches:
      - agent/service-composition-platform
    paths:
      - .github/workflows/apply-service-composition.yml
      - tools/apply-service-composition.py.gz.b64.part*
      - tools/service-doc.gz.b64.part*

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Decode and apply development payload
        shell: bash
        run: |
          cat tools/apply-service-composition.py.gz.b64.part* \
            | base64 -d \
            | gzip -d > tools/apply-service-composition.py
          python tools/apply-service-composition.py

      - name: Install dependencies for deterministic generation
        run: pnpm install --frozen-lockfile

      - name: Generate composition artifacts and evidence
        shell: bash
        run: |
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge composition:generate --project "$project"
            pnpm forge composition:docs --project "$project"
            pnpm forge config:reference --project "$project"
            pnpm forge kernel-config:docs --project "$project"
          done

      - name: Refresh deployed consumer documentation fixture
        shell: bash
        run: |
          project=packages/forge/tests/fixtures/documented-project
          pnpm forge docs:sync --project "$project"
          pnpm forge docs:adapters --project "$project"
          pnpm forge docs:generate --project "$project"
          pnpm forge context:build ATLAS-TASK-0001 --project "$project"

      - name: Commit development result
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: implement service composition platform"
          git push origin HEAD:agent/service-composition-platform
