name: Apply Stage 3 Final Repair

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-stage3-final-repair.yml

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Stage 3 Repair
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Stage 3 Repair
  APP_ID: winzard-stage3-repair
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: stage3-repair-${{ github.run_id }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-repair
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/service-composition-platform
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Patch source and metadata
        shell: python
        run: |
          from pathlib import Path

          project = Path('packages/forge/src/checks/project.ts')
          source = project.read_text()
          old = "  if (projectFile.startsWith('src/composition/') && !importsServerOnly) {\n"
          new = "  if (\n    projectFile.startsWith('src/composition/') &&\n    !projectFile.endsWith('.composition.definition.ts') &&\n    !importsServerOnly\n  ) {\n"
          if old in source:
              source = source.replace(old, new, 1)
          elif new not in source:
              raise RuntimeError('unexpected project check shape')
          project.write_text(source)

          test = Path('packages/forge/tests/project.test.ts')
          source = test.read_text()
          needle = "    expect(inspect('src/composition/demo.ts', 'export const demo = {};')).toContainEqual(expect.objectContaining({ code: 'COMPOSITION_MISSING_SERVER_ONLY' }));\n"
          addition = needle + "    expect(inspect('src/composition/demo.composition.definition.ts', 'export const demo = defineComposition({});')).not.toContainEqual(expect.objectContaining({ code: 'COMPOSITION_MISSING_SERVER_ONLY' }));\n"
          if addition not in source:
              if needle not in source:
                  raise RuntimeError('project test insertion point missing')
              source = source.replace(needle, addition, 1)
          test.write_text(source)

          contract = Path('packages/forge/assets/consumer-contract/platform-contracts/WZ-CONTRACT-COMPOSITION-001.md')
          source = contract.read_text()
          source = source.replace('verification_status: verified', 'verification_status: unverified', 1)
          source = source.replace('last_verified: 2026-07-22', 'last_verified:', 1)
          start = source.index('evidence:')
          end = source.index('\ntags:', start)
          source = source[:start] + 'evidence: []' + source[end:]
          contract.write_text(source)
      - run: pnpm install --frozen-lockfile
      - name: Refresh consumer fixture
        run: |
          project=packages/forge/tests/fixtures/documented-project
          pnpm forge docs:sync --project "$project"
          pnpm forge docs:adapters --project "$project"
          pnpm forge docs:generate --project "$project"
          pnpm forge context:build ATLAS-TASK-0001 --project "$project"
      - name: Targeted regression
        run: |
          pnpm vitest run packages/forge/tests/project.test.ts packages/forge/tests/documentation.test.ts packages/forge/tests/composition.test.ts
          pnpm verify:documentation
          pnpm forge check --project templates/webapp
      - name: Commit clean repair
        run: |
          rm -f .github/workflows/apply-stage3-final-repair.yml
          rm -f .github/workflows/stage-3-fix.yml
          rm -f tools/apply-stage3-service-composition-fixes.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: correct composition evidence and definition boundary"
          git push origin HEAD:agent/service-composition-platform
