name: Apply stage 3 recipe configuration fix

on:
  push:
    branches: [agent/service-composition-platform]
    paths: [.github/workflows/apply-stage3-recipe-config-fix.yml]

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Stage 3
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Stage 3
  APP_ID: winzard-reference
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: stage3-recipe-${{ github.run_id }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-recipe
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Align recipe metadata
        shell: python
        run: |
          import json
          from pathlib import Path

          kernel_path = Path('recipes/kernel-configuration/recipe.json')
          kernel = json.loads(kernel_path.read_text())
          kernel['environment'] = [key for key in kernel.get('environment', []) if key != 'COMPOSITION_HASH']
          kernel['configuration'] = [item for item in kernel.get('configuration', []) if item.get('key') != 'COMPOSITION_HASH']
          kernel_path.write_text(json.dumps(kernel, ensure_ascii=False, indent=2) + '\n')

          service_path = Path('recipes/service-composition/recipe.json')
          service = json.loads(service_path.read_text())
          service['environment'] = ['COMPOSITION_HASH']
          service['configuration'] = [{
            'key': 'COMPOSITION_HASH',
            'owner': 'service-composition',
            'required': False,
            'phase': 'process-start',
            'classification': 'internal',
            'rebuildRequired': False,
            'restartRequired': True,
            'type': 'string[4,64]',
            'example': 'auto',
            'description': 'Opcionális deployment-elvárás a canonical composition fingerprinthez; auto esetén nincs külső pin.',
            'introduced': '0.1.0',
            'defaultValue': 'auto',
          }]
          service_path.write_text(json.dumps(service, ensure_ascii=False, indent=2) + '\n')
      - run: pnpm install --frozen-lockfile
      - name: Configure deterministic Server Action key
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Verify configuration and remaining core gates
        run: |
          pnpm verify:configuration
          pnpm forge check --project apps/reference
          pnpm verify:minimal-template
          pnpm build
          pnpm test:e2e:reference
      - name: Commit recipe fix and remove diagnostics
        run: |
          rm -f .github/workflows/apply-stage3-recipe-config-fix.yml
          rm -f .github/workflows/stage-3-continuation.yml
          rm -f .github/workflows/apply-stage3-view-doc-fix.yml
          rm -f tools/stage3-configuration.log tools/stage3-configuration.status
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: align composition configuration recipe ownership"
          git push origin HEAD:agent/service-composition-platform
