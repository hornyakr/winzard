name: Apply stage 3 service composition fixes

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-stage3-service-composition-fixes.yml
      - tools/apply-stage3-service-composition-fixes.py

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      APP_URL: http://localhost:3000
      APP_NAME: Winzard Stage 3 Fix
      APP_STAGE: local
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard Stage 3 Fix
      APP_ID: winzard-stage3-fix
      APP_REGION: local
      GIT_COMMIT: ${{ github.sha }}
      BUILD_ID: ${{ github.sha }}
      DEPLOYMENT_ID: stage3-fix-${{ github.run_id }}
      SOURCE_DATE_EPOCH: '0'
      DEFAULT_LOCALE: hu
      ENABLED_LOCALES: hu,en
      TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
      SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
      SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
      TRUSTED_PROXY_MODE: none
      TRUSTED_PROXY_CIDRS: 127.0.0.1/32
      TRUSTED_PROXY_HOPS: '1'
      NEXT_DIST_DIR: .next
      NEXT_OUTPUT_STANDALONE: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
      KERNEL_VERBOSE_DIAGNOSTICS: 'false'
      CACHE_SCHEMA_VERSION: '1'
      COMPOSITION_HASH: auto
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-fix
      WORKER_CONCURRENCY: '4'
      WORKER_VISIBILITY_TIMEOUT_MS: '60000'
      WORKER_SHUTDOWN_GRACE_MS: '30000'
      WORKER_POLL_INTERVAL_MS: '1000'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Apply corrections
        run: python tools/apply-stage3-service-composition-fixes.py
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Refresh deployed consumer documentation fixture
        shell: bash
        run: |
          project=packages/forge/tests/fixtures/documented-project
          pnpm forge docs:sync --project "$project"
          pnpm forge docs:adapters --project "$project"
          pnpm forge docs:generate --project "$project"
          pnpm forge context:build ATLAS-TASK-0001 --project "$project"
      - name: Run targeted regression checks
        shell: bash
        run: |
          pnpm vitest run packages/forge/tests/project.test.ts packages/forge/tests/documentation.test.ts packages/forge/tests/composition.test.ts
          pnpm verify:documentation
          pnpm forge check --project templates/webapp
      - name: Commit corrected result
        shell: bash
        run: |
          rm -f .github/workflows/apply-stage3-service-composition-fixes.yml tools/apply-stage3-service-composition-fixes.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: correct composition documentation and definition boundaries"
          git push origin HEAD:agent/service-composition-platform
