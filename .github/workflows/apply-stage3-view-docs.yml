name: Apply Stage 3 View Docs

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-stage3-view-docs.yml

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/service-composition-platform
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate and check view evidence
        run: |
          pnpm forge view:contracts --project apps/reference
          pnpm forge view:contracts --check --project apps/reference
          pnpm forge view:check --project apps/reference
          pnpm forge view:assets --check --project apps/reference
      - name: Commit view evidence
        run: |
          rm -f .github/workflows/apply-stage3-view-docs.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: refresh generated view evidence"
          git push origin HEAD:agent/service-composition-platform
