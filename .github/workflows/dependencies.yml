name: Temporary dependency bundle

on:
  push:
    branches:
      - agent/http-kernel-platform
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack dependency tree
        run: tar -czf node-modules.tar.gz node_modules

      - name: Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: node-modules
          path: node-modules.tar.gz
          compression-level: 0
          retention-days: 1
