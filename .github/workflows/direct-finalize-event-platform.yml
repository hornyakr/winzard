name: Direct finalize event platform

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      APP_URL: http://localhost:3000
      APP_NAME: Winzard Stage 3 Finalizer
      APP_STAGE: local
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard Stage 3 Finalizer
      APP_ID: winzard-stage3-finalizer
      APP_REGION: local
      GIT_COMMIT: ${{ github.sha }}
      BUILD_ID: ${{ github.sha }}
      DEPLOYMENT_ID: stage3-finalizer-${{ github.run_id }}-${{ github.run_attempt }}
      SOURCE_DATE_EPOCH: '0'
      DEFAULT_LOCALE: hu
      ENABLED_LOCALES: hu,en
      TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
      SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
      SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
      TRUSTED_PROXY_MODE: none
      TRUSTED_PROXY_CIDRS: 127.0.0.1/32
      TRUSTED_PROXY_HOPS: '1'
      NEXT_DIST_DIR: .next
      NEXT_OUTPUT_STANDALONE: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
      KERNEL_VERBOSE_DIAGNOSTICS: 'false'
      CACHE_SCHEMA_VERSION: '1'
      COMPOSITION_HASH: auto
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-finalizer
      WORKER_CONCURRENCY: '4'
      WORKER_VISIBILITY_TIMEOUT_MS: '60000'
      WORKER_SHUTDOWN_GRACE_MS: '30000'
      WORKER_POLL_INTERVAL_MS: '1000'
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: '10'
      DATABASE_CONNECTION_TIMEOUT_MS: '5000'

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/event-dispatching-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure deterministic Server Action key
        shell: bash
        run: |
          {
            printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY='
            printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0
            printf '\n'
          } >> "$GITHUB_ENV"

      - name: Apply Stage 3 corrections and implementation scripts
        run: |
          bash tools/stage3-fix-event-platform.sh
          bash tools/finalize-events-runtime.sh
          bash tools/finalize-events-reference.sh
          bash tools/finalize-events-outbox.sh
          bash tools/finalize-events-forge.sh

      - name: Generate event and composition artifacts
        run: |
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge event:generate --project "$project"
            pnpm forge event:docs --project "$project"
            pnpm forge composition:generate --project "$project"
            pnpm forge composition:docs --project "$project"
          done

      - name: Generate Prisma and Next.js types
        run: |
          pnpm db:validate:webapp
          pnpm db:generate:webapp
          pnpm typegen
          pnpm exec next typegen templates/minimal
          pnpm exec next typegen templates/webapp

      - name: Run event and messaging tests
        run: |
          pnpm vitest run packages/forge/tests/events.test.ts packages/forge/tests/events-runtime.test.ts apps/reference/tests/unit/platform/events/dispatcher.test.ts apps/reference/tests/unit/modules/demo/lucky-number/event-dispatch.test.ts
          pnpm vitest run --config templates/webapp/vitest.config.ts
          pnpm test

      - name: Run type, lint and architecture checks
        run: |
          pnpm typecheck
          pnpm exec tsc -p templates/minimal/tsconfig.json --noEmit
          pnpm exec tsc -p templates/webapp/tsconfig.json --noEmit
          pnpm lint
          pnpm verify:events
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge check --project "$project"
            pnpm forge composition:generate --check --project "$project"
            pnpm forge composition:docs --check --project "$project"
          done

      - name: Record Stage 3 correction checks
        shell: bash
        run: |
          cat > docs/development/event-dispatching-development-checks.md <<EOF
          # Event-dispatching Stage 3 correction checks

          Development head before final commit: \`${GITHUB_SHA}\`
          Workflow run: \`${GITHUB_RUN_ID}\` / attempt \`${GITHUB_RUN_ATTEMPT}\`

          | Correction gate | Result |
          | --- | --- |
          | Forge event tests | PASS |
          | Reference dispatcher and vertical slice tests | PASS |
          | Webapp messaging tests | PASS |
          | Repository unit tests | PASS |
          | Root, minimal and webapp typecheck | PASS |
          | ESLint | PASS |
          | Reference, minimal and webapp architecture checks | PASS |
          | Event generated artifact drift | PASS |
          | Composition generated artifact drift | PASS |

          The complete core, database, runtime-security and reproducibility matrix
          is executed by the repository Verify workflow. No merge to \`main\` occurred.
          EOF

      - name: Remove all staging artifacts
        run: |
          rm -f tools/finalize-events-*.sh
          rm -f tools/stage3-fix-event-platform.sh
          rm -f tools/event-finalize.* tools/event-platform.payload.* tools/event-doc.payload.*
          rm -f .github/workflows/apply-event-platform.yml
          rm -f .github/workflows/finalize-event-platform.yml
          rm -f .github/workflows/direct-finalize-event-platform.yml
          rm -f .github/workflows/stage3-diagnostics.yml

      - name: Commit corrected implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: complete Stage 3 event platform corrections"
          git push
