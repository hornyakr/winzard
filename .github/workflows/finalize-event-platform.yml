name: Finalize event platform

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/event-dispatching-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reconstruct and apply finalization payload
        shell: bash
        run: |
          cat tools/event-finalize.payload.* | base64 -d > /tmp/event-finalize.tar.gz
          test "$(sha256sum /tmp/event-finalize.tar.gz | cut -d' ' -f1)" = "73cafd2cdef685f864d7e2582d8c8ad1392fcf4e8de1356900cc4d86c7a148be"
          rm -rf /tmp/event-finalize
          mkdir -p /tmp/event-finalize
          tar -xzf /tmp/event-finalize.tar.gz -C /tmp/event-finalize --strip-components=1
          bash /tmp/event-finalize/apply.sh "$PWD"

      - name: Correct Prisma runtime and transaction client boundaries
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          for target in [
              Path('templates/webapp/src/platform/messaging/prisma-outbox.repository.ts'),
              Path('recipes/transactional-outbox/files/src/platform/messaging/prisma-outbox.repository.ts'),
          ]:
              source = target.read_text()
              source = source.replace(
                  "import type { Prisma } from '@/generated/prisma/client';",
                  "import { Prisma, type PrismaClient } from '@/generated/prisma/client';",
              )
              source = source.replace(
                  'type Database = Prisma.TransactionClient;',
                  'type Transaction = Prisma.TransactionClient;',
              )
              source = source.replace(
                  'function transaction(value: unknown): Database {',
                  'function transaction(value: unknown): Transaction {',
              )
              source = source.replace(
                  'return value as Database;',
                  'return value as Transaction;',
              )
              source = source.replace(
                  'constructor(private readonly database: Database) {}',
                  'constructor(private readonly database: PrismaClient) {}',
              )
              target.write_text(source)
          PY

      - name: Generate deterministic event and composition artifacts
        run: |
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge event:generate --project "$project"
            pnpm forge event:docs --project "$project"
          done
          pnpm forge composition:generate --project apps/reference
          pnpm forge composition:docs --project apps/reference
          pnpm forge composition:generate --project templates/webapp
          pnpm forge composition:docs --project templates/webapp

      - name: Generate Prisma and Next.js types
        run: |
          pnpm db:validate:webapp
          pnpm db:generate:webapp
          pnpm typegen
          next typegen templates/webapp

      - name: Run event and outbox development tests
        run: |
          pnpm vitest run packages/forge/tests/events.test.ts apps/reference/tests/unit/platform/events/dispatcher.test.ts apps/reference/tests/unit/modules/demo/lucky-number/event-dispatch.test.ts
          pnpm vitest run --config templates/webapp/vitest.config.ts

      - name: Run development type and drift checks
        run: |
          pnpm typecheck
          tsc -p templates/webapp/tsconfig.json --noEmit
          pnpm verify:events
          pnpm forge composition:generate --check --project apps/reference
          pnpm forge composition:docs --check --project apps/reference
          pnpm forge composition:generate --check --project templates/webapp
          pnpm forge composition:docs --check --project templates/webapp

      - name: Remove temporary payload and workflow
        run: |
          rm -f tools/event-finalize.payload.*
          rm -f .github/workflows/finalize-event-platform.yml

      - name: Commit finalized development
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: complete event runtime and outbox adapters"
          git push
