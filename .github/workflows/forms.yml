name: Forms

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Reference
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Reference
  APP_ID: winzard-reference
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: forms-${{ github.run_id }}-${{ github.run_attempt }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-reference
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  forms:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure deterministic CI-only Server Action key
        shell: bash
        run: |
          {
            printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY='
            printf '%s' '${{ github.repository_id }}:${{ github.sha }}' \
              | openssl dgst -sha256 -binary \
              | base64 -w0
            printf '\n'
          } >> "$GITHUB_ENV"

      - name: Type-check forms platform
        id: typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee /tmp/forms-typecheck.log

      - name: Upload forms type-check diagnostics
        if: failure() && steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: forms-typecheck-${{ github.run_id }}
          path: /tmp/forms-typecheck.log
          if-no-files-found: error

      - name: Run forms unit tests
        run: pnpm vitest run packages/forge/tests/forms.test.ts apps/reference/tests/unit/modules/demo/lucky-number/lucky-number.form.test.ts

      - name: Verify form contracts
        id: formverify
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:forms 2>&1 | tee /tmp/forms-verify.log

      - name: Regenerate form evidence for diagnostics
        if: failure() && steps.formverify.outcome == 'failure'
        run: pnpm forge form:docs --project apps/reference

      - name: Upload forms verification diagnostics
        if: failure() && steps.formverify.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: forms-verification-${{ github.run_id }}
          path: |
            /tmp/forms-verify.log
            apps/reference/docs/90-generated/forms
          if-no-files-found: error

      - name: Verify adjacent delivery contracts
        id: deliveryverify
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:delivery 2>&1 | tee /tmp/forms-delivery.log

      - name: Regenerate delivery evidence for diagnostics
        if: failure() && steps.deliveryverify.outcome == 'failure'
        run: pnpm forge http:contracts --project apps/reference

      - name: Upload adjacent delivery diagnostics
        if: failure() && steps.deliveryverify.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: forms-delivery-${{ github.run_id }}
          path: |
            /tmp/forms-delivery.log
            apps/reference/docs/90-generated/delivery
          if-no-files-found: error

      - name: Verify adjacent view contracts
        id: viewverify
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:views 2>&1 | tee /tmp/forms-views.log

      - name: Regenerate view evidence for diagnostics
        if: failure() && steps.viewverify.outcome == 'failure'
        run: pnpm forge view:contracts --project apps/reference

      - name: Upload adjacent view diagnostics
        if: failure() && steps.viewverify.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: forms-views-${{ github.run_id }}
          path: |
            /tmp/forms-views.log
            apps/reference/docs/90-generated/views
          if-no-files-found: error

      - name: Build reference application
        run: pnpm build
