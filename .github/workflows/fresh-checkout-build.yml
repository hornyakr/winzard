name: Fresh Checkout Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build from fresh local checkout
        shell: bash
        run: |
          rm -f \
            apps/reference/.env.local \
            templates/minimal/.env.local \
            templates/webapp/.env.local
          env \
            -u CI \
            -u APP_URL \
            -u APP_NAME \
            -u APP_STAGE \
            -u LOG_LEVEL \
            -u NEXT_PUBLIC_APP_NAME \
            -u NEXT_SERVER_ACTIONS_ENCRYPTION_KEY \
            pnpm build
          test -f apps/reference/.env.local
          test -f templates/minimal/.env.local
          test -f templates/webapp/.env.local
