name: Persistence

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'
  DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
  DATABASE_POOL_MAX: '10'
  DATABASE_CONNECTION_TIMEOUT_MS: '5000'

jobs:
  persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee /tmp/persistence-typecheck.log

      - name: Upload type-check diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: persistence-typecheck-${{ github.run_id }}
          path: /tmp/persistence-typecheck.log
          if-no-files-found: error

      - name: Validate Prisma schema
        run: pnpm db:validate:webapp

      - name: Generate Prisma Client
        run: pnpm db:generate:webapp

      - name: Apply migrations
        run: pnpm db:migrate:deploy:webapp

      - name: Verify persistence contracts
        run: pnpm verify:persistence

      - name: Run PostgreSQL integration tests
        run: pnpm --dir templates/webapp test:integration
