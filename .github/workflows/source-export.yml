name: source-export

on:
  push:
    branches:
      - agent/template-presentation-platform
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Create source archive
        run: tar --exclude=.git -czf "$RUNNER_TEMP/winzard-source.tar.gz" .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: winzard-source
          path: ${{ runner.temp }}/winzard-source.tar.gz
          if-no-files-found: error
          retention-days: 1
