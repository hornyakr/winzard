name: Finalize template and presentation implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: finalize-template-presentation-platform-pr-v6
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: 10
      DATABASE_CONNECTION_TIMEOUT_MS: 5000
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out staging commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reconstruct and finalize the reviewed implementation
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/winzard-finalize"
          mkdir -p "$work"
          cat .winzard-finalize/prefix-00.b64 .winzard-finalize/prefix-01.b64 \
            | base64 --decode > "$work/final.patch.gz"
          for part in .winzard-finalize/patch-*.bin; do
            cat "$part" >> "$work/final.patch.gz"
          done
          echo "b3b430ce796a86dfb3fb9fdffb9ae63a91e88d0baccb015900121b9b047c0965  $work/final.patch.gz" \
            | sha256sum --check --strict
          gzip --decompress --stdout "$work/final.patch.gz" > "$work/final.patch"
          echo "c7dbf51484492a46d1d3f929f9fd569d5cfd27313849a8fc254472520558442a  $work/final.patch" \
            | sha256sum --check --strict

          git reset --hard cd84265cde8ef70ae76435264c14f4c109d8ab2e
          git apply --check "$work/final.patch"
          git apply --index "$work/final.patch"

          python - <<'PY'
          from pathlib import Path

          page = Path('apps/reference/src/app/(public)/lucky/number/range/[minimum]/[maximum]/page.tsx')
          source = page.read_text(encoding='utf-8')
          old = """export default async function LuckyNumberRangePage({ params }: LuckyNumberRangePageProps) {
            await connection();
            const parsed = luckyNumberRangeParamsSchema.safeParse(await params);
            if (!parsed.success) notFound();

            const result = (() => {"""
          new = """export default async function LuckyNumberRangePage({ params }: LuckyNumberRangePageProps) {
            const parsed = luckyNumberRangeParamsSchema.safeParse(await params);
            if (!parsed.success) notFound();
            await connection();

            const result = (() => {"""
          if old not in source:
              raise SystemExit('Expected dynamic route block was not found.')
          page.write_text(source.replace(old, new), encoding='utf-8')

          smoke = Path('apps/reference/tests/e2e/lucky-number.smoke.ts')
          source = smoke.read_text(encoding='utf-8')
          old = """  const invalid = await fetch(`${baseUrl}/lucky/number/range/20/10`);
            assert.equal(invalid.status, 404);"""
          new = """  const invalid = await fetch(`${baseUrl}/lucky/number/range/20/10`);
            const invalidHtml = (await invalid.text()).replaceAll('<!-- -->', '');
            assert.equal(invalid.status, 404);
            assert.match(invalid.headers.get('cache-control') ?? '', /\\bno-store\\b/u);
            assert.match(invalidHtml, /Érvénytelen szerencseszám-tartomány/u);"""
          if old not in source:
              raise SystemExit('Expected dynamic-route E2E assertion was not found.')
          smoke.write_text(source.replace(old, new), encoding='utf-8')

          record = Path('docs/development/template-presentation-implementation.md')
          source = record.read_text(encoding='utf-8')
          marker = '- root és nested layout, route-level `template.tsx`, loading, error és not-found boundary;'
          addition = marker + '\n- matcher-szűkített Proxy guard, amely az érvénytelen dinamikus tartományt a streamelés előtt valódi, `no-store` HTTP 404 válasszal zárja le;'
          if addition not in source:
              if marker not in source:
                  raise SystemExit('Expected implementation-record marker was not found.')
              record.write_text(source.replace(marker, addition), encoding='utf-8')
          PY

          cat > apps/reference/src/proxy.ts <<'TS'
          import { NextResponse } from 'next/server';
          import type { NextRequest } from 'next/server';

          import { luckyNumberRangeParamsSchema } from './modules/demo/lucky-number/presentation/lucky-number.schemas';

          const dynamicRangePath = /^\/lucky\/number\/range\/([^/]+)\/([^/]+)\/?$/u;
          const invalidRangeDocument = [
            '<!doctype html>',
            '<html lang="hu">',
            '<head>',
            '<meta charset="utf-8">',
            '<meta name="robots" content="noindex">',
            '<meta name="viewport" content="width=device-width, initial-scale=1">',
            '<title>Érvénytelen szerencseszám-tartomány</title>',
            '</head>',
            '<body>',
            '<main>',
            '<h1>Érvénytelen szerencseszám-tartomány.</h1>',
            '<p>A minimum, maximum vagy a tartomány mérete nem felel meg a szerződésnek.</p>',
            '<p><a href="/lucky/number">Vissza az alapértelmezett tartományhoz</a></p>',
            '</main>',
            '</body>',
            '</html>',
          ].join('');

          export function proxy(request: NextRequest) {
            const match = dynamicRangePath.exec(request.nextUrl.pathname);
            if (!match) return NextResponse.next();

            const parsed = luckyNumberRangeParamsSchema.safeParse({
              minimum: match[1],
              maximum: match[2],
            });
            if (parsed.success) return NextResponse.next();

            return new NextResponse(invalidRangeDocument, {
              status: 404,
              headers: {
                'Cache-Control': 'no-store',
                'Content-Type': 'text/html; charset=utf-8',
                'X-Robots-Tag': 'noindex',
              },
            });
          }

          export const config = {
            matcher: '/lucky/number/range/:minimum/:maximum',
          };
          TS

          git add --all
          git diff --cached --check
          final_tree="$(git write-tree)"
          echo "FINAL_TREE=$final_tree" >> "$GITHUB_ENV"
          echo "Final source tree: $final_tree" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run complete core verification
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:core 2>&1 | tee "$RUNNER_TEMP/verify-core.log"

      - name: Upload core verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-verify-core-log
          path: ${{ runner.temp }}/verify-core.log
          if-no-files-found: error
          retention-days: 1

      - name: Run complete database verification
        if: always()
        shell: bash
        run: |
          set -o pipefail
          pnpm verify:database 2>&1 | tee "$RUNNER_TEMP/verify-database.log"

      - name: Upload database verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-verify-database-log
          path: ${{ runner.temp }}/verify-database.log
          if-no-files-found: error
          retention-days: 1

      - name: Confirm verification did not mutate tracked source
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code
          git diff --cached --check
          test "$(git write-tree)" = "$FINAL_TREE"

      - name: Publish one clean commit
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --soft origin/main
          test "$(git write-tree)" = "$FINAL_TREE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: implement template and presentation platform"
          test "$(git rev-parse 'HEAD^{tree}')" = "$FINAL_TREE"
          test "$(git rev-list --count origin/main..HEAD)" = "1"
          git push --force origin HEAD:refs/heads/agent/template-presentation-finalized
          echo "Final commit: $(git rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
