name: source-export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose-final-source:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: 10
      DATABASE_CONNECTION_TIMEOUT_MS: 5000
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out staging commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reconstruct and verify final patch
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/winzard-finalize"
          mkdir -p "$work"
          cat .winzard-finalize/prefix-00.b64 .winzard-finalize/prefix-01.b64 \
            | base64 --decode > "$work/final.patch.gz"
          for part in .winzard-finalize/patch-*.bin; do
            cat "$part" >> "$work/final.patch.gz"
          done
          echo "b3b430ce796a86dfb3fb9fdffb9ae63a91e88d0baccb015900121b9b047c0965  $work/final.patch.gz" \
            | sha256sum --check --strict
          gzip --decompress --stdout "$work/final.patch.gz" > "$work/final.patch"
          echo "c7dbf51484492a46d1d3f929f9fd569d5cfd27313849a8fc254472520558442a  $work/final.patch" \
            | sha256sum --check --strict

      - name: Materialize the reviewed source tree
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/winzard-finalize"
          git reset --hard cd84265cde8ef70ae76435264c14f4c109d8ab2e
          git apply --check "$work/final.patch"
          git apply --index "$work/final.patch"
          git diff --cached --check
          test "$(git write-tree)" = "73ae4695572dbfd257c42b63fa3cc653a1e72363"
          tar --exclude=.git --exclude=.winzard-finalize -czf "$RUNNER_TEMP/winzard-final-source.tar.gz" .

      - name: Upload materialized final source
        uses: actions/upload-artifact@v4
        with:
          name: winzard-final-source
          path: ${{ runner.temp }}/winzard-final-source.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run complete core verification
        id: core
        shell: bash
        run: |
          set +e
          pnpm verify:core 2>&1 | tee "$RUNNER_TEMP/verify-core.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload core verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-core-log
          path: ${{ runner.temp }}/verify-core.log
          if-no-files-found: error
          retention-days: 1

      - name: Run complete database verification
        if: always()
        id: database
        shell: bash
        run: |
          set +e
          pnpm verify:database 2>&1 | tee "$RUNNER_TEMP/verify-database.log"
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload database verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-database-log
          path: ${{ runner.temp }}/verify-database.log
          if-no-files-found: error
          retention-days: 1
