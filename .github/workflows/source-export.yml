name: source-export

on:
  push:
    branches:
      - agent/template-presentation-platform
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Create source archive
        run: tar --exclude=.git --exclude=winzard-source.tar.gz --warning=no-file-changed -czf winzard-source.tar.gz .
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: winzard-source
          path: winzard-source.tar.gz
          if-no-files-found: error
          retention-days: 1
