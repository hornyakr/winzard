name: Publish clean template and presentation branch

on:
  push:
    branches:
      - agent/template-presentation-platform
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-template-presentation-platform
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out staging commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reconstruct the reviewed implementation
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/winzard-finalize"
          mkdir -p "$work"
          cat .winzard-finalize/prefix-00.b64 .winzard-finalize/prefix-01.b64 \
            | base64 --decode > "$work/final.patch.gz"
          for part in .winzard-finalize/patch-*.bin; do
            cat "$part" >> "$work/final.patch.gz"
          done
          echo "b3b430ce796a86dfb3fb9fdffb9ae63a91e88d0baccb015900121b9b047c0965  $work/final.patch.gz" \
            | sha256sum --check --strict
          gzip --decompress --stdout "$work/final.patch.gz" > "$work/final.patch"
          echo "c7dbf51484492a46d1d3f929f9fd569d5cfd27313849a8fc254472520558442a  $work/final.patch" \
            | sha256sum --check --strict

          git reset --hard dc7e6fc41588f759925b2290e7d8be7296031a8f
          git apply --check "$work/final.patch"
          git apply --index "$work/final.patch"

          python - <<'PY'
          from pathlib import Path

          path = Path('apps/reference/src/app/(public)/lucky/number/range/[minimum]/[maximum]/page.tsx')
          source = path.read_text(encoding='utf-8')
          old = """export default async function LuckyNumberRangePage({ params }: LuckyNumberRangePageProps) {
            await connection();
            const parsed = luckyNumberRangeParamsSchema.safeParse(await params);
            if (!parsed.success) notFound();

            const result = (() => {"""
          new = """export default async function LuckyNumberRangePage({ params }: LuckyNumberRangePageProps) {
            const parsed = luckyNumberRangeParamsSchema.safeParse(await params);
            if (!parsed.success) notFound();
            await connection();

            const result = (() => {"""
          if old not in source:
              raise SystemExit('Expected dynamic route block was not found.')
          path.write_text(source.replace(old, new), encoding='utf-8')
          PY

          git add --all
          git diff --cached --check
          test "$(git write-tree)" = "f84f6c80f184a2d5d7a7e46c769f10898c109a1e"

      - name: Publish one clean commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: implement template and presentation platform"
          test "$(git rev-parse 'HEAD^{tree}')" = "f84f6c80f184a2d5d7a7e46c769f10898c109a1e"
          test "$(git rev-list --count dc7e6fc41588f759925b2290e7d8be7296031a8f..HEAD)" = "1"
          git push --force origin HEAD:refs/heads/agent/template-presentation-finalized
