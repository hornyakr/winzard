name: Temporary source export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Upload source checkout
        uses: actions/upload-artifact@v4
        with:
          name: winzard-source-export
          path: |
            .
            !.git
            !node_modules
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
