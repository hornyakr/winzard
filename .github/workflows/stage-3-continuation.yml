# Final continuation after generated view evidence refresh
name: Stage 3 Continuation

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/stage-3-continuation.yml

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Stage 3
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Stage 3
  APP_ID: winzard-stage3
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: stage3-continuation-${{ github.run_id }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-continuation
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  continuation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure deterministic Server Action key
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - run: pnpm verify:documentation
      - run: pnpm verify:routing
      - run: pnpm verify:delivery
      - run: pnpm verify:kernel
      - run: pnpm verify:kernel-configuration
      - run: pnpm verify:composition
      - run: pnpm verify:views
      - run: pnpm verify:configuration
      - run: pnpm forge check --project apps/reference
      - run: pnpm verify:minimal-template
      - run: pnpm build
      - run: pnpm test:e2e:reference
