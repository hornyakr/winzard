name: Stage 3 Fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/stage-3-fix.yml

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Stage 3 Fix
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Stage 3 Fix
  APP_ID: winzard-stage3-fix
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: stage3-fix-${{ github.run_id }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-fix
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/service-composition-platform
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Apply focused fixes
        shell: python
        run: |
          from pathlib import Path

          contract = Path('packages/forge/assets/consumer-contract/platform-contracts/WZ-CONTRACT-COMPOSITION-001.md')
          text = contract.read_text()
          start = text.index('evidence:')
          end = text.index('\ntags:', start)
          text = text[:start] + 'evidence: []' + text[end:]
          contract.write_text(text)

          project = Path('packages/forge/src/checks/project.ts')
          text = project.read_text()
          old = "  if (projectFile.startsWith('src/composition/') && !importsServerOnly) {\n"
          new = "  if (\n    projectFile.startsWith('src/composition/') &&\n    !projectFile.endsWith('.composition.definition.ts') &&\n    !importsServerOnly\n  ) {\n"
          if old not in text:
              raise RuntimeError('composition boundary pattern not found')
          project.write_text(text.replace(old, new, 1))
      - run: pnpm install --frozen-lockfile
      - name: Refresh consumer documentation fixture
        run: |
          project=packages/forge/tests/fixtures/documented-project
          pnpm forge docs:sync --project "$project"
          pnpm forge docs:adapters --project "$project"
          pnpm forge docs:generate --project "$project"
          pnpm forge context:build ATLAS-TASK-0001 --project "$project"
      - name: Verify focused repairs
        run: |
          pnpm test
          pnpm forge check --project apps/reference
          pnpm forge check --project templates/minimal
          pnpm forge check --project templates/webapp
          pnpm verify:documentation
      - name: Commit repairs and remove helpers
        run: |
          rm -f .github/workflows/stage-3-fix.yml
          rm -f .github/workflows/apply-stage3-service-composition-fixes.yml
          rm -f tools/apply-stage3-service-composition-fixes.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: repair composition documentation and boundary checks"
          git push origin HEAD:agent/service-composition-platform
