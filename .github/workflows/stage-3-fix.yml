name: Stage 3 Fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/stage-3-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/service-composition-platform
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Apply focused fixes
        shell: python
        run: |
          from pathlib import Path
          contract = Path('packages/forge/assets/consumer-contract/platform-contracts/WZ-CONTRACT-COMPOSITION-001.md')
          text = contract.read_text()
          text = text.replace('  - command:pnpm forge composition:check --project .\n', '  - command:pnpm forge composition:check\n')
          text = text.replace('  - command:pnpm forge composition:generate --check --project .\n', '  - command:pnpm forge composition:generate --check\n')
          contract.write_text(text)
          project = Path('packages/forge/src/checks/project.ts')
          text = project.read_text()
          old = "  if (projectFile.startsWith('src/composition/') && !importsServerOnly) {\n"
          new = "  if (\n    projectFile.startsWith('src/composition/') &&\n    !projectFile.endsWith('.composition.definition.ts') &&\n    !importsServerOnly\n  ) {\n"
          if old not in text:
              raise RuntimeError('composition boundary pattern not found')
          project.write_text(text.replace(old, new, 1))
      - run: pnpm install --frozen-lockfile
      - name: Refresh consumer documentation fixture
        run: |
          project=packages/forge/tests/fixtures/documented-project
          pnpm forge docs:sync --project "$project"
          pnpm forge docs:adapters --project "$project"
          pnpm forge docs:generate --project "$project"
          pnpm forge context:build ATLAS-TASK-0001 --project "$project"
      - name: Capture focused verification
        shell: bash
        run: |
          set +e
          pnpm test > repair-unit.log 2>&1; echo $? > repair-unit.status
          pnpm forge check --project apps/reference > repair-reference.log 2>&1; echo $? > repair-reference.status
          pnpm forge check --project templates/minimal > repair-minimal.log 2>&1; echo $? > repair-minimal.status
          pnpm forge check --project templates/webapp > repair-webapp.log 2>&1; echo $? > repair-webapp.status
          pnpm verify:documentation > repair-documentation.log 2>&1; echo $? > repair-documentation.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: stage-3-repair-diagnostics
          path: |
            repair-*.log
            repair-*.status
          if-no-files-found: error
      - name: Require focused verification success
        run: |
          cat repair-*.status
          test "$(cat repair-unit.status)" = 0
          test "$(cat repair-reference.status)" = 0
          test "$(cat repair-minimal.status)" = 0
          test "$(cat repair-webapp.status)" = 0
          test "$(cat repair-documentation.status)" = 0
      - name: Commit repairs and remove helper
        run: |
          rm -f .github/workflows/stage-3-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: repair composition documentation and boundary checks"
          git push origin HEAD:agent/service-composition-platform
