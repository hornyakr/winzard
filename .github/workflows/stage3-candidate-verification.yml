name: Stage 3 Candidate Verification

on:
  push:
    branches:
      - agent/testing-platform-v1-verify
  workflow_dispatch:

permissions:
  contents: write

env:
  CANDIDATE_SHA: 131ca6f0f44cedb24414d54c65ec696bc21a29d5
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Reference
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Reference
  APP_ID: winzard-reference
  APP_REGION: local
  GIT_COMMIT: 131ca6f0f44cedb24414d54c65ec696bc21a29d5
  BUILD_ID: 131ca6f0f44cedb24414d54c65ec696bc21a29d5
  DEPLOYMENT_ID: stage3-candidate
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  core:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure Server Action key
        shell: bash
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ env.CANDIDATE_SHA }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run core, component and fresh-checkout gates
        id: gate
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm verify:core
            pnpm test:component
            rm -f apps/reference/.env.local templates/minimal/.env.local templates/webapp/.env.local
            env -u CI -u APP_URL -u APP_NAME -u APP_STAGE -u LOG_LEVEL -u NEXT_PUBLIC_APP_NAME -u NEXT_SERVER_ACTIONS_ENCRYPTION_KEY pnpm build
            test -f apps/reference/.env.local
            test -f templates/minimal/.env.local
            test -f templates/webapp/.env.local
          } 2>&1 | tee /tmp/stage3-core.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage3-core
          path: /tmp/stage3-core.log
          if-no-files-found: error

  database:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard_test
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://winzard:winzard_test_only@127.0.0.1:5432/winzard_test?schema=public
      DATABASE_POOL_MAX: '10'
      DATABASE_CONNECTION_TIMEOUT_MS: '5000'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure Server Action key
        shell: bash
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ env.CANDIDATE_SHA }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run database and persistence gates
        shell: bash
        run: |
          set -o pipefail
          {
            pnpm db:validate:webapp
            pnpm db:generate:webapp
            pnpm db:migrate:deploy:webapp
            pnpm verify:database
            pnpm --dir templates/webapp test:integration
            pnpm --dir templates/webapp exec tsx tools/capture-outbox-query-plan.ts --output=/tmp/outbox-claim.query-plan.json --verify=tests/evidence/outbox-claim.query-plan.json
          } 2>&1 | tee /tmp/stage3-database.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage3-database
          path: |
            /tmp/stage3-database.log
            /tmp/outbox-claim.query-plan.json
          if-no-files-found: warn

  browser:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_URL: http://127.0.0.1:3200
      TRUSTED_HOSTS: 127.0.0.1:3200,127.0.0.1,localhost:3200,localhost,[::1]
      SERVER_ACTION_ALLOWED_ORIGINS: 127.0.0.1:3200,localhost:3200
      PLAYWRIGHT_PORT: '3200'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure Server Action key
        shell: bash
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ env.CANDIDATE_SHA }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run browser and accessibility gate
        shell: bash
        run: pnpm test:e2e 2>&1 | tee /tmp/stage3-browser.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage3-browser
          path: |
            /tmp/stage3-browser.log
            playwright-report
            test-results
          if-no-files-found: warn

  runtime-security:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: production
      APP_URL: https://app.example.test
      APP_NAME: Winzard Reference Runtime Smoke
      APP_STAGE: staging
      NEXT_PUBLIC_APP_NAME: Winzard Reference Runtime Smoke
      TRUSTED_HOSTS: app.example.test
      SERVER_ACTION_ALLOWED_ORIGINS: app.example.test
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-runtime-security
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure Server Action key
        shell: bash
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ env.CANDIDATE_SHA }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run runtime-security gate
        shell: bash
        run: |
          set -o pipefail
          { pnpm build && pnpm test:runtime:readonly; } 2>&1 | tee /tmp/stage3-runtime.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage3-runtime-security
          path: /tmp/stage3-runtime.log
          if-no-files-found: error

  reproducibility:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CANDIDATE_SHA }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure Server Action key
        shell: bash
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ env.CANDIDATE_SHA }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run reproducibility gate
        shell: bash
        run: |
          set -o pipefail
          {
            rm -rf /tmp/winzard-repro-a
            pnpm build
            mv apps/reference/.next /tmp/winzard-repro-a
            pnpm build
            mv /tmp/winzard-repro-a apps/reference/.next-repro-a
            pnpm forge build:reproducibility --project apps/reference --artifact .next-repro-a --compare .next
          } 2>&1 | tee /tmp/stage3-reproducibility.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stage3-reproducibility
          path: /tmp/stage3-reproducibility.log
          if-no-files-found: error

  record:
    if: always() && github.actor != 'github-actions[bot]'
    needs: [core, database, browser, runtime-security, reproducibility]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/testing-platform-v1-verify
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          pattern: stage3-*
          path: /tmp/stage3-artifacts
          merge-multiple: true
      - name: Write verification evidence
        shell: python
        env:
          CORE_RESULT: ${{ needs.core.result }}
          DATABASE_RESULT: ${{ needs.database.result }}
          BROWSER_RESULT: ${{ needs.browser.result }}
          RUNTIME_RESULT: ${{ needs.runtime-security.result }}
          REPRO_RESULT: ${{ needs.reproducibility.result }}
        run: |
          import json, os
          from pathlib import Path
          results = {
              'candidate': os.environ['CANDIDATE_SHA'],
              'core': os.environ['CORE_RESULT'],
              'database': os.environ['DATABASE_RESULT'],
              'browser': os.environ['BROWSER_RESULT'],
              'runtimeSecurity': os.environ['RUNTIME_RESULT'],
              'reproducibility': os.environ['REPRO_RESULT'],
          }
          target = Path('docs/development/testing-stage3-machine-result.json')
          target.write_text(json.dumps(results, indent=2) + '\n')
          failures = Path('docs/development/testing-stage3-failure-logs')
          failures.mkdir(parents=True, exist_ok=True)
          artifact_root = Path('/tmp/stage3-artifacts')
          for log in artifact_root.rglob('*.log'):
              lines = log.read_text(errors='replace').splitlines()
              failures.joinpath(log.name).write_text('\n'.join(lines[-300:]) + '\n')
      - name: Commit verification evidence
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/development/testing-stage3-machine-result.json docs/development/testing-stage3-failure-logs
          git commit -m "test(testing): record Stage 3 candidate result"
          git push origin HEAD:agent/testing-platform-v1-verify
