name: Stage 3 Config Diagnostic

on:
  push:
    branches: [agent/service-composition-platform]
    paths: [.github/workflows/stage3-config-diagnostic.yml]

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Stage 3
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Stage 3
  APP_ID: winzard-stage3
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: stage3-config-${{ github.run_id }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-config
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture configuration output
        shell: bash
        run: |
          set +e
          pnpm verify:configuration > tools/stage3-configuration.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > tools/stage3-configuration.status
          cat tools/stage3-configuration.log
      - name: Persist diagnostic and remove helper
        run: |
          rm -f .github/workflows/stage3-config-diagnostic.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "ci: record stage 3 configuration diagnostics"
          git push origin HEAD:agent/service-composition-platform
