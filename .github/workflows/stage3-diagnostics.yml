name: Stage 3 diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      APP_URL: http://localhost:3000
      APP_NAME: Winzard Stage 3
      APP_STAGE: local
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard Stage 3
      APP_ID: winzard-stage3
      APP_REGION: local
      GIT_COMMIT: ${{ github.sha }}
      BUILD_ID: ${{ github.sha }}
      DEPLOYMENT_ID: stage3-${{ github.run_id }}-${{ github.run_attempt }}
      SOURCE_DATE_EPOCH: '0'
      DEFAULT_LOCALE: hu
      ENABLED_LOCALES: hu,en
      TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
      SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
      SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
      TRUSTED_PROXY_MODE: none
      TRUSTED_PROXY_CIDRS: 127.0.0.1/32
      TRUSTED_PROXY_HOPS: '1'
      NEXT_DIST_DIR: .next
      NEXT_OUTPUT_STANDALONE: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
      KERNEL_VERBOSE_DIAGNOSTICS: 'false'
      CACHE_SCHEMA_VERSION: '1'
      COMPOSITION_HASH: auto
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3
      WORKER_CONCURRENCY: '4'
      WORKER_VISIBILITY_TIMEOUT_MS: '60000'
      WORKER_SHUTDOWN_GRACE_MS: '30000'
      WORKER_POLL_INTERVAL_MS: '1000'
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: '10'
      DATABASE_CONNECTION_TIMEOUT_MS: '5000'

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/event-dispatching-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure deterministic Server Action key
        shell: bash
        run: |
          {
            printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY='
            printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0
            printf '\n'
          } >> "$GITHUB_ENV"

      - name: Apply Stage 2 finalization scripts
        shell: bash
        run: |
          bash tools/finalize-events-runtime.sh
          bash tools/finalize-events-reference.sh
          bash tools/finalize-events-outbox.sh
          bash tools/finalize-events-forge.sh

      - name: Generate artifacts and types
        shell: bash
        run: |
          for project in apps/reference templates/minimal templates/webapp; do
            pnpm forge event:generate --project "$project"
            pnpm forge event:docs --project "$project"
            pnpm forge composition:generate --project "$project"
            pnpm forge composition:docs --project "$project"
          done
          pnpm db:validate:webapp
          pnpm db:generate:webapp
          pnpm typegen
          pnpm exec next typegen templates/minimal
          pnpm exec next typegen templates/webapp

      - name: Run diagnostic gates
        shell: bash
        run: |
          mkdir -p /tmp/stage3-logs
          run_gate() {
            name="$1"
            shift
            set +e
            "$@" >"/tmp/stage3-logs/${name}.log" 2>&1
            status=$?
            set -e
            printf '%s\n' "$status" >"/tmp/stage3-logs/${name}.exit"
          }
          run_gate lint pnpm lint
          run_gate event-tests pnpm vitest run packages/forge/tests/events.test.ts packages/forge/tests/events-runtime.test.ts apps/reference/tests/unit/platform/events/dispatcher.test.ts apps/reference/tests/unit/modules/demo/lucky-number/event-dispatch.test.ts
          run_gate webapp-tests pnpm vitest run --config templates/webapp/vitest.config.ts
          run_gate typecheck pnpm typecheck
          run_gate minimal-typecheck pnpm exec tsc -p templates/minimal/tsconfig.json --noEmit
          run_gate webapp-typecheck pnpm exec tsc -p templates/webapp/tsconfig.json --noEmit
          run_gate verify-events pnpm verify:events
          run_gate forge-reference pnpm forge check --project apps/reference
          run_gate forge-minimal pnpm forge check --project templates/minimal
          run_gate forge-webapp pnpm forge check --project templates/webapp
          run_gate verify-core pnpm verify:core
          run_gate verify-database pnpm verify:database
          find /tmp/stage3-logs -name '*.exit' -print -exec cat {} \;

      - name: Package applied worktree
        if: always()
        shell: bash
        run: |
          tar --exclude=.git --exclude=node_modules --exclude='**/.next' --exclude='**/.next-*' -czf /tmp/stage3-worktree.tar.gz .

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage3-diagnostics-${{ github.run_id }}
          path: |
            /tmp/stage3-logs
            /tmp/stage3-worktree.tar.gz
          retention-days: 7
