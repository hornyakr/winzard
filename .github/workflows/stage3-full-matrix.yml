name: Stage 3 Full Matrix

on:
  push:
    branches:
      - agent/service-composition-platform
    paths:
      - .github/workflows/stage3-full-matrix.yml
      - tools/stage3-full-matrix-trigger.txt

permissions:
  contents: write

env:
  NEXT_TELEMETRY_DISABLED: '1'
  APP_URL: http://localhost:3000
  APP_NAME: Winzard Stage 3
  APP_STAGE: local
  LOG_LEVEL: error
  NEXT_PUBLIC_APP_NAME: Winzard Stage 3
  APP_ID: winzard-stage3
  APP_REGION: local
  GIT_COMMIT: ${{ github.sha }}
  BUILD_ID: ${{ github.sha }}
  DEPLOYMENT_ID: stage3-${{ github.run_id }}-${{ github.run_attempt }}
  SOURCE_DATE_EPOCH: '0'
  DEFAULT_LOCALE: hu
  ENABLED_LOCALES: hu,en
  TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
  SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
  SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
  TRUSTED_PROXY_MODE: none
  TRUSTED_PROXY_CIDRS: 127.0.0.1/32
  TRUSTED_PROXY_HOPS: '1'
  NEXT_DIST_DIR: .next
  NEXT_OUTPUT_STANDALONE: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
  PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
  KERNEL_VERBOSE_DIAGNOSTICS: 'false'
  CACHE_SCHEMA_VERSION: '1'
  COMPOSITION_HASH: auto
  RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3
  WORKER_CONCURRENCY: '4'
  WORKER_VISIBILITY_TIMEOUT_MS: '60000'
  WORKER_SHUTDOWN_GRACE_MS: '30000'
  WORKER_POLL_INTERVAL_MS: '1000'

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure deterministic Server Action key
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run core gate
        shell: bash
        run: |
          set +e
          pnpm verify:core > core.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > core.status
          cat core.log
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-core
          path: |
            core.log
            core.status

  runtime-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: production
      APP_URL: https://app.example.test
      APP_NAME: Winzard Reference Runtime Smoke
      APP_STAGE: staging
      APP_ID: winzard-reference
      TRUSTED_HOSTS: app.example.test
      SERVER_ACTION_ALLOWED_ORIGINS: app.example.test
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-runtime
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure deterministic Server Action key
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run runtime-security gate
        shell: bash
        run: |
          set +e
          (pnpm build && pnpm test:runtime:readonly) > runtime-security.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > runtime-security.status
          cat runtime-security.log
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-runtime-security
          path: |
            runtime-security.log
            runtime-security.status

  reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure deterministic Server Action key
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run reproducibility gate
        shell: bash
        run: |
          set +e
          (
            rm -rf /tmp/winzard-stage3-repro-a apps/reference/.next apps/reference/.next-repro-a
            pnpm build
            mv apps/reference/.next /tmp/winzard-stage3-repro-a
            pnpm build
            mv /tmp/winzard-stage3-repro-a apps/reference/.next-repro-a
            pnpm forge build:reproducibility --project apps/reference --artifact .next-repro-a --compare .next
          ) > reproducibility.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > reproducibility.status
          cat reproducibility.log
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-reproducibility
          path: |
            reproducibility.log
            reproducibility.status

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: '10'
      DATABASE_CONNECTION_TIMEOUT_MS: '5000'
      APP_ID: winzard-webapp
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-stage3-webapp
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Configure deterministic Server Action key
        run: |
          printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=' >> "$GITHUB_ENV"
          printf '%s' '${{ github.repository_id }}:${{ github.sha }}' | openssl dgst -sha256 -binary | base64 -w0 >> "$GITHUB_ENV"
          printf '\n' >> "$GITHUB_ENV"
      - name: Run database gate
        shell: bash
        run: |
          set +e
          pnpm verify:database > database.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > database.status
          cat database.log
      - uses: actions/upload-artifact@v4
        with:
          name: stage3-database
          path: |
            database.log
            database.status

  aggregate:
    needs: [core, runtime-security, reproducibility, database]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform
      - uses: actions/download-artifact@v5
        with:
          pattern: stage3-*
          path: stage3-results
          merge-multiple: true
      - name: Record matrix result
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/development tools
          report=docs/development/service-composition-verification.md
          failure=tools/stage3-service-composition-failure.log
          failed=0
          : > "$failure"
          {
            printf '# Service composition – 3. szakasz verifikáció\n\n'
            printf 'Testelt commit: `%s`\n\n' '${{ github.sha }}'
            printf 'GitHub Actions futás: `%s` / attempt `%s`\n\n' '${{ github.run_id }}' '${{ github.run_attempt }}'
            printf '| Kapu | Eredmény |\n| --- | --- |\n'
            for gate in core runtime-security reproducibility database; do
              status=$(cat "stage3-results/$gate.status")
              if [ "$status" = 0 ]; then
                result=PASS
              else
                result="FAIL (exit $status)"
                failed=1
                {
                  printf '\n===== %s (exit %s) =====\n' "$gate" "$status"
                  tail -n 600 "stage3-results/$gate.log"
                } >> "$failure"
              fi
              printf '| `%s` | %s |\n' "$gate" "$result"
            done
            printf '\nA `main` ágba merge nem történt.\n'
          } > "$report"

          rm -rf stage3-results
          if [ "$failed" = 0 ]; then
            rm -f "$failure"
            rm -f .github/workflows/stage3-full-matrix.yml
            rm -f .github/workflows/stage-3-diagnostics.yml
            rm -f .github/workflows/stage-3-verification.yml
            rm -f tools/stage3-full-matrix-trigger.txt
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: record complete service composition verification"
          git push origin HEAD:agent/service-composition-platform

          if [ "$failed" != 0 ]; then
            exit 1
          fi
