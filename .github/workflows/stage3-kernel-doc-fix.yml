name: Stage 3 Kernel Documentation Fix

on:
  push:
    branches:
      - agent/testing-platform-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-kernel-evidence:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/testing-platform-v1
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate and verify kernel evidence
        run: |
          pnpm forge lifecycle:docs --project apps/reference
          pnpm forge lifecycle:docs --check --project apps/reference
      - name: Commit canonical kernel evidence
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/reference/docs/90-generated/kernel
          git commit -m "docs(testing): regenerate kernel evidence"
          git pull --rebase origin agent/testing-platform-v1
          git push origin HEAD:agent/testing-platform-v1
