name: Stage 3 service composition verification

on:
  push:
    branches:
      - agent/service-composition-platform
    paths:
      - .github/workflows/stage3-service-composition-verification.yml
      - apps/**
      - docs/**
      - package.json
      - packages/**
      - recipes/**
      - templates/**
      - tools/stage3-verification-trigger.txt

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      APP_URL: http://localhost:3000
      APP_NAME: Winzard Reference
      APP_STAGE: local
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard Reference
      APP_ID: winzard-reference
      APP_REGION: local
      GIT_COMMIT: ${{ github.sha }}
      BUILD_ID: ${{ github.sha }}
      DEPLOYMENT_ID: stage3-${{ github.run_id }}-${{ github.run_attempt }}
      SOURCE_DATE_EPOCH: '0'
      DEFAULT_LOCALE: hu
      ENABLED_LOCALES: hu,en
      TRUSTED_HOSTS: localhost:3000,127.0.0.1,[::1]
      SERVER_ACTION_ALLOWED_ORIGINS: localhost:3000
      SERVER_ACTION_BODY_SIZE_LIMIT: 1mb
      TRUSTED_PROXY_MODE: none
      TRUSTED_PROXY_CIDRS: 127.0.0.1/32
      TRUSTED_PROXY_HOPS: '1'
      NEXT_DIST_DIR: .next
      NEXT_OUTPUT_STANDALONE: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS: 'false'
      PRODUCTION_BROWSER_SOURCE_MAPS_WAIVER: not-required
      KERNEL_VERBOSE_DIAGNOSTICS: 'false'
      CACHE_SCHEMA_VERSION: '1'
      COMPOSITION_HASH: auto
      RUNTIME_WRITABLE_ROOT: /tmp/winzard-reference
      WORKER_CONCURRENCY: '4'
      WORKER_VISIBILITY_TIMEOUT_MS: '60000'
      WORKER_SHUTDOWN_GRACE_MS: '30000'
      WORKER_POLL_INTERVAL_MS: '1000'
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: '10'
      DATABASE_CONNECTION_TIMEOUT_MS: '5000'

    steps:
      - name: Checkout development branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: agent/service-composition-platform

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Configure deterministic Server Action key
        shell: bash
        run: |
          {
            printf 'NEXT_SERVER_ACTIONS_ENCRYPTION_KEY='
            printf '%s' '${{ github.repository_id }}:${{ github.sha }}' \
              | openssl dgst -sha256 -binary \
              | base64 -w0
            printf '\n'
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute complete verification matrix
        id: matrix
        shell: bash
        run: |
          set -u
          mkdir -p docs/development tools
          report=docs/development/service-composition-verification.md
          failure_log=tools/stage3-service-composition-failure.log
          : > "$failure_log"
          failed=0

          run_check() {
            label="$1"
            command="$2"
            output="/tmp/stage3-${label}.log"
            printf 'Running %s\n' "$label"
            set +e
            bash -lc "$command" > "$output" 2>&1
            status=$?
            set -e
            printf '%s=%s\n' "$label" "$status" >> /tmp/stage3-statuses
            if [ "$status" -ne 0 ]; then
              failed=1
              {
                printf '\n===== %s (exit %s) =====\n' "$label" "$status"
                tail -n 500 "$output"
              } >> "$failure_log"
            fi
            cat "$output"
          }

          : > /tmp/stage3-statuses
          run_check core 'pnpm verify:core'
          run_check database 'pnpm verify:database'
          run_check runtime-security 'rm -rf apps/reference/.next && NODE_ENV=production APP_URL=https://app.example.test APP_NAME="Winzard Reference Runtime Smoke" APP_STAGE=staging TRUSTED_HOSTS=app.example.test SERVER_ACTION_ALLOWED_ORIGINS=app.example.test DEPLOYMENT_ID=stage3-runtime-${{ github.run_id }} RUNTIME_WRITABLE_ROOT=/tmp/winzard-runtime-security pnpm build && NODE_ENV=production APP_URL=https://app.example.test APP_NAME="Winzard Reference Runtime Smoke" APP_STAGE=staging TRUSTED_HOSTS=app.example.test SERVER_ACTION_ALLOWED_ORIGINS=app.example.test DEPLOYMENT_ID=stage3-runtime-${{ github.run_id }} RUNTIME_WRITABLE_ROOT=/tmp/winzard-runtime-security pnpm test:runtime:readonly'
          run_check reproducibility 'rm -rf /tmp/winzard-repro-a apps/reference/.next apps/reference/.next-repro-a && pnpm build && mv apps/reference/.next /tmp/winzard-repro-a && pnpm build && mv /tmp/winzard-repro-a apps/reference/.next-repro-a && pnpm forge build:reproducibility --project apps/reference --artifact .next-repro-a --compare .next && rm -rf apps/reference/.next-repro-a'

          {
            printf '# Service composition – 3. szakasz verifikáció\n\n'
            printf 'Testelt commit: `%s`\n\n' '${{ github.sha }}'
            printf 'GitHub Actions futás: `%s` / attempt `%s`\n\n' '${{ github.run_id }}' '${{ github.run_attempt }}'
            printf '| Kapu | Eredmény |\n| --- | --- |\n'
            while IFS='=' read -r label status; do
              if [ "$status" -eq 0 ]; then result=PASS; else result="FAIL (exit $status)"; fi
              printf '| `%s` | %s |\n' "$label" "$result"
            done < /tmp/stage3-statuses
            printf '\nA `main` ágba merge nem történt.\n'
          } > "$report"

          if [ "$failed" -eq 0 ]; then
            rm -f "$failure_log" .github/workflows/stage3-service-composition-verification.yml tools/stage3-verification-trigger.txt
            printf 'result=pass\n' >> "$GITHUB_OUTPUT"
          else
            printf 'result=fail\n' >> "$GITHUB_OUTPUT"
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: record service composition verification"
          git push origin HEAD:agent/service-composition-platform

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
