name: Testing Capability Bootstrap

on:
  push:
    branches:
      - agent/testing-platform-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-capabilities:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: agent/testing-platform-v1
          fetch-depth: 0

      - name: Apply testing capability contracts
        shell: python
        run: |
          import json
          from pathlib import Path

          manifest = Path('packages/forge/src/manifest.ts')
          source = manifest.read_text()
          old = "  'reference-app',\n] as const;"
          new = """  'reference-app',
            'testing-core',
            'testing-dom',
            'testing-database',
            'testing-e2e',
            'testing-accessibility',
            'testing-visual',
          ] as const;"""
          if old in source:
              manifest.write_text(source.replace(old, new))
          elif "  'testing-core'," not in source:
              raise SystemExit('knownCapabilities insertion point not found')

          checks = Path('packages/forge/src/checks/project.ts')
          source = checks.read_text()
          old = "  'reference-app': { all: ['apps/reference'] },\n};"
          new = """  'reference-app': { all: ['apps/reference'] },
            'testing-core': { all: ['testing.definition.ts'], requires: ['forge'] },
            'testing-dom': { requires: ['testing-core', 'next-app'] },
            'testing-database': { requires: ['testing-core', 'prisma-postgresql'] },
            'testing-e2e': { requires: ['testing-core', 'next-app'] },
            'testing-accessibility': { requires: ['testing-e2e'] },
            'testing-visual': { requires: ['testing-e2e'] },
          };"""
          if old in source:
              checks.write_text(source.replace(old, new))
          elif "  'testing-core':" not in source:
              raise SystemExit('CAPABILITY_REQUIREMENTS insertion point not found')

          updates = {
              Path('package.json'): ['testing-core'],
              Path('apps/reference/winzard.json'): [
                  'testing-core',
                  'testing-dom',
                  'testing-e2e',
                  'testing-accessibility',
              ],
              Path('templates/minimal/package.json'): ['testing-core'],
              Path('templates/webapp/package.json'): ['testing-core', 'testing-database'],
          }
          for file, capabilities in updates.items():
              data = json.loads(file.read_text())
              manifest_data = data['winzard'] if file.name == 'package.json' else data
              current = manifest_data['capabilities']
              for capability in capabilities:
                  if capability not in current:
                      current.append(capability)
              file.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')

      - name: Commit capability contracts
        shell: bash
        run: |
          if git diff --quiet -- packages/forge/src/manifest.ts packages/forge/src/checks/project.ts package.json apps/reference/winzard.json templates/minimal/package.json templates/webapp/package.json; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add packages/forge/src/manifest.ts packages/forge/src/checks/project.ts package.json apps/reference/winzard.json templates/minimal/package.json templates/webapp/package.json
          git commit -m "feat(testing): register testing capabilities [skip ci]"
          git push origin HEAD:agent/testing-platform-v1
