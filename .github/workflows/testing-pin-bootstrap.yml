name: Testing Dependency Pin Bootstrap

on:
  push:
    branches:
      - agent/testing-platform-v1

permissions:
  contents: write

jobs:
  pin-dependencies:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/testing-platform-v1
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Pin testing dependencies
        run: >-
          pnpm add -D --save-exact
          @axe-core/playwright@4.12.1
          @playwright/test@1.61.1
          @testing-library/dom@10.4.1
          @testing-library/react@16.3.2
          @testing-library/user-event@14.6.1
          @vitejs/plugin-react@6.0.4
          @vitest/coverage-v8@4.1.10
          jsdom@29.1.1
          vite-tsconfig-paths@6.1.1
      - name: Commit exact versions
        shell: bash
        run: |
          if git diff --quiet -- package.json pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json pnpm-lock.yaml
          git commit -m "chore(testing): pin testing dependencies [skip ci]"
          git push origin HEAD:agent/testing-platform-v1
