name: Testing Stage 3 Fix

on:
  push:
    branches:
      - agent/testing-platform-v1

permissions:
  contents: write

jobs:
  apply-stage3-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/testing-platform-v1
          fetch-depth: 0

      - name: Apply verified Stage 3 corrections
        shell: python
        run: |
          import json
          from pathlib import Path

          database_replacements = {
              'POSTGRES_DB: winzard\n': 'POSTGRES_DB: winzard_test\n',
              'POSTGRES_PASSWORD: winzard_dev_only\n': 'POSTGRES_PASSWORD: winzard_test_only\n',
              'pg_isready -U winzard -d winzard': 'pg_isready -U winzard -d winzard_test',
              'postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public':
                  'postgresql://winzard:winzard_test_only@127.0.0.1:5432/winzard_test?schema=public',
          }
          for relative in [
              '.github/workflows/persistence.yml',
              '.github/workflows/verify.yml',
              'docs/development/persistence-development-checks.md',
          ]:
              file = Path(relative)
              source = file.read_text()
              for old, new in database_replacements.items():
                  source = source.replace(old, new)
              file.write_text(source)

          package = Path('package.json')
          data = json.loads(package.read_text())
          pins = {
              '@axe-core/playwright': '4.12.1',
              '@playwright/test': '1.61.1',
              '@testing-library/dom': '10.4.1',
              '@testing-library/react': '16.3.2',
              '@testing-library/user-event': '14.6.1',
              '@vitejs/plugin-react': '6.0.4',
              '@vitest/coverage-v8': '4.1.10',
              'jsdom': '29.1.1',
              'vite-tsconfig-paths': '6.1.1',
          }
          data['devDependencies'].update(pins)
          package.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')

          lock = Path('pnpm-lock.yaml')
          source = lock.read_text()
          for version in pins.values():
              source = source.replace(f'specifier: ^{version}', f'specifier: {version}')
          lock.write_text(source)

          generated = Path('apps/reference/docs/90-generated/delivery')
          generated.joinpath('delivery-map.md').write_text('''<!-- Generated by Winzard Forge. -->
          <!-- Source: Next.js delivery entrypoints and static TypeScript inspection. -->
          <!-- Do not edit directly. -->

          # Delivery map

          Inventory SHA-256: `bdf50fb8af7f062f359d2cf37ba0dd81c7aaac22fc58f6fd80c4a601638a30af`

          | Kind | Method | Route | Entrypoint | Runtime | Contract | Streaming |
          | --- | --- | --- | --- | --- | --- | --- |
          | page | GET | `/lucky/number` | `src/app/(public)/lucky/number/(index)/page.tsx` | nodejs | `demo.lucky-number.page` | no |
          | page | GET | `/lucky/number/range/[minimum]/[maximum]` | `src/app/(public)/lucky/number/range/[minimum]/[maximum]/page.tsx` | nodejs | `demo.lucky-number.range.page` | no |
          | page | GET | `/` | `src/app/page.tsx` | nodejs | `reference.home.page` | no |
          | route-handler | GET | `/api/health/live` | `src/app/api/health/live/route.ts` | nodejs | `platform.health.live` | no |
          | route-handler | GET | `/api/lucky/number/range/[minimum]/[maximum]` | `src/app/api/lucky/number/range/[minimum]/[maximum]/route.ts` | nodejs | `demo.lucky-number.range.api` | no |
          | route-handler | GET,POST | `/api/lucky/number` | `src/app/api/lucky/number/route.ts` | nodejs | `demo.lucky-number.api` | no |
          | server-action | - | `-` | `src/modules/demo/lucky-number/presentation/lucky-number.actions.ts` | unknown | `demo.lucky-number.generate.action` | no |
          '''.replace('          ', ''))
          generated.joinpath('http-contracts.md').write_text('''<!-- Generated by Winzard Forge. -->
          <!-- Source: Next.js delivery entrypoints and static TypeScript inspection. -->
          <!-- Do not edit directly. -->

          # HTTP and UI delivery contracts

          Inventory SHA-256: `bdf50fb8af7f062f359d2cf37ba0dd81c7aaac22fc58f6fd80c4a601638a30af`

          | Entrypoint | Contract | Context | Auth | Tenant | Input schema | Actor resolver | Authorization | Application operation | Presenter | Output | Response/cache | CSRF | Idempotency | Body limit | Tests |
          | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |
          | `src/app/(public)/lucky/number/(index)/page.tsx` | `demo.lucky-number.page` | required | optional | none | `luckyNumberRangeQuerySchema` | `createPageRequestContext` | none | `demo.queries.getLuckyNumber` | presentLuckyNumber | `not-found`<br>`react-ui` | private-no-store | - | - | - | `tests/browser/lucky-number.spec.ts`<br>`tests/e2e/lucky-number.smoke.ts`<br>`tests/unit/app/api/lucky/number/route.test.ts`<br>`tests/unit/app/api/lucky/number/routing.test.ts`<br>`tests/unit/modules/demo/lucky-number/lucky-number.presenter.test.ts`<br>`tests/unit/modules/demo/lucky-number/routing.test.ts` |
          | `src/app/(public)/lucky/number/range/[minimum]/[maximum]/page.tsx` | `demo.lucky-number.range.page` | required | optional | none | `luckyNumberRangeParamsSchema` | `createPageRequestContext` | none | `demo.queries.getLuckyNumber` | presentLuckyNumber | `not-found`<br>`react-ui` | private-no-store | - | - | - | `tests/unit/app/api/lucky/number/routing.test.ts` |
          | `src/app/page.tsx` | `reference.home.page` | none | public | none | - | - | none | - | - | `react-ui` | public-static | - | - | - | `tests/e2e/lucky-number.smoke.ts` |
          | `src/app/api/health/live/route.ts` | `platform.health.live` | required | public | none | - | - | GET:none | - | - | `response` | health | none | none | - | `tests/e2e/lucky-number.smoke.ts` |
          | `src/app/api/lucky/number/range/[minimum]/[maximum]/route.ts` | `demo.lucky-number.range.api` | required | optional | none | `luckyNumberRangeParamsSchema` | - | GET:none | `demo.queries.getLuckyNumber` | toLuckyNumberResponse | `response` | api-private | none | none | - | `tests/unit/app/api/lucky/number/routing.test.ts` |
          | `src/app/api/lucky/number/route.ts` | `demo.lucky-number.api` | required | optional | none | `luckyNumberRequestSchema` | - | GET:none,POST:demo.lucky-number.generate-custom-range | `demo.commands.generateLuckyNumber`<br>`demo.queries.getLuckyNumber` | toLuckyNumberResponse | `response` | api-private | same-origin | none | 16384 | `tests/e2e/lucky-number.smoke.ts`<br>`tests/unit/app/api/lucky/number/route.test.ts`<br>`tests/unit/app/api/lucky/number/routing.test.ts`<br>`tests/unit/modules/demo/lucky-number/lucky-number.presenter.test.ts` |
          | `src/modules/demo/lucky-number/presentation/lucky-number.actions.ts` | `demo.lucky-number.generate.action` | required | optional | none | `luckyNumberFormSchema` | `createActionRequestContext` | demo.lucky-number.generate-custom-range | `demo.commands.generateLuckyNumber` | toGenerateLuckyNumberInput, toLuckyNumberResponse | `action-state` | - | framework-origin-plus-session | none | - | `tests/unit/modules/demo/lucky-number/lucky-number.actions.test.ts` |
          '''.replace('          ', ''))
          generated.joinpath('security-status.md').write_text('''<!-- Generated by Winzard Forge. -->
          <!-- Source: Next.js delivery entrypoints and static TypeScript inspection. -->
          <!-- Do not edit directly. -->

          # Delivery security status

          Inventory SHA-256: `bdf50fb8af7f062f359d2cf37ba0dd81c7aaac22fc58f6fd80c4a601638a30af`

          | Severity | Code | File | Message |
          | --- | --- | --- | --- |
          | pass | - | - | No delivery issue detected. |
          '''.replace('          ', ''))

          Path('.github/workflows/testing-stage3-fix.yml').unlink()

      - name: Commit Stage 3 corrections
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/persistence.yml .github/workflows/verify.yml \
            apps/reference/docs/90-generated/delivery package.json pnpm-lock.yaml \
            docs/development/persistence-development-checks.md \
            .github/workflows/testing-stage3-fix.yml
          git commit -m "fix(testing): align test database and generated evidence"
          git push origin HEAD:agent/testing-platform-v1
