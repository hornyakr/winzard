name: Testing Stage 3 Fix

on:
  push:
    branches:
      - agent/testing-platform-v1
  pull_request:

permissions:
  contents: write

jobs:
  apply-stage3-fixes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/testing-platform-v1
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply verified Stage 3 corrections
        shell: python
        run: |
          import json
          from pathlib import Path

          replacements = {
              'POSTGRES_DB: winzard\n': 'POSTGRES_DB: winzard_test\n',
              'POSTGRES_PASSWORD: winzard_dev_only\n': 'POSTGRES_PASSWORD: winzard_test_only\n',
              'pg_isready -U winzard -d winzard': 'pg_isready -U winzard -d winzard_test',
              'postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public':
                  'postgresql://winzard:winzard_test_only@127.0.0.1:5432/winzard_test?schema=public',
          }
          for relative in [
              '.github/workflows/persistence.yml',
              '.github/workflows/verify.yml',
              'docs/development/persistence-development-checks.md',
          ]:
              file = Path(relative)
              source = file.read_text()
              for old, new in replacements.items():
                  source = source.replace(old, new)
              file.write_text(source)

          package = Path('package.json')
          data = json.loads(package.read_text())
          pins = {
              '@axe-core/playwright': '4.12.1',
              '@playwright/test': '1.61.1',
              '@testing-library/dom': '10.4.1',
              '@testing-library/react': '16.3.2',
              '@testing-library/user-event': '14.6.1',
              '@vitejs/plugin-react': '6.0.4',
              '@vitest/coverage-v8': '4.1.10',
              'jsdom': '29.1.1',
              'vite-tsconfig-paths': '6.1.1',
          }
          data['devDependencies'].update(pins)
          package.write_text(json.dumps(data, indent=2, ensure_ascii=False) + '\n')

          lock = Path('pnpm-lock.yaml')
          source = lock.read_text()
          for version in pins.values():
              source = source.replace(f'specifier: ^{version}', f'specifier: {version}')
          lock.write_text(source)

          playwright = Path('playwright.config.ts')
          source = playwright.read_text().replace(
              'command: `pnpm build && pnpm start -- -H 127.0.0.1 -p ${port}`',
              'command: `pnpm build && pnpm exec next start apps/reference -H 127.0.0.1 -p ${port}`',
          )
          playwright.write_text(source)

          testing_workflow = Path('.github/workflows/testing.yml')
          source = testing_workflow.read_text()
          old = "  browser-accessibility:\n    runs-on: ubuntu-latest\n    timeout-minutes: 25\n    steps:\n"
          new = (
              "  browser-accessibility:\n"
              "    runs-on: ubuntu-latest\n"
              "    timeout-minutes: 25\n"
              "    env:\n"
              "      APP_URL: http://127.0.0.1:3200\n"
              "      TRUSTED_HOSTS: 127.0.0.1:3200,127.0.0.1,localhost:3200,localhost,[::1]\n"
              "      SERVER_ACTION_ALLOWED_ORIGINS: 127.0.0.1:3200,localhost:3200\n"
              "      PLAYWRIGHT_PORT: '3200'\n"
              "    steps:\n"
          )
          if old not in source and 'PLAYWRIGHT_PORT:' not in source:
              raise SystemExit('browser-accessibility insertion point not found')
          testing_workflow.write_text(source.replace(old, new))

          Path('.github/workflows/testing-stage3-fix.yml').unlink()

      - name: Regenerate canonical evidence
        run: |
          pnpm forge http:contracts --project apps/reference
          pnpm forge test:docs --project .

      - name: Verify corrected static contracts
        run: |
          pnpm forge http:contracts --check --project apps/reference
          pnpm forge test:check --project .
          pnpm forge test:docs --check --project .

      - name: Commit Stage 3 corrections
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/persistence.yml .github/workflows/verify.yml \
            .github/workflows/testing.yml playwright.config.ts \
            apps/reference/docs/90-generated/delivery docs/90-generated/testing \
            package.json pnpm-lock.yaml docs/development/persistence-development-checks.md \
            .github/workflows/testing-stage3-fix.yml
          git commit -m "fix(testing): align CI, browser runtime and generated evidence"
          git push origin HEAD:agent/testing-platform-v1
