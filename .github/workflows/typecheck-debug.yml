name: Verification diagnostics

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  verification-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture typecheck output
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Capture lint output
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log

      - name: Upload verification output
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics
          path: |
            typecheck.log
            lint.log
            packages/forge/src/extensions/recipe.ts
          if-no-files-found: error

      - name: Preserve verification result
        if: steps.typecheck.outcome == 'failure' || steps.lint.outcome == 'failure'
        run: exit 1
