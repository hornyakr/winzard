name: Apply recovered implementation source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-source:
    if: github.head_ref == 'agent/project-documentation-implementation'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout implementation branch with full history
        uses: actions/checkout@v6
        with:
          ref: agent/project-documentation-implementation
          fetch-depth: 0

      - name: Reconstruct and commit implementation source
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/verify.yml /tmp/active-verify.yml
          cat .winzard-recovery/chunk-* | base64 --decode > /tmp/winzard-doc-impl.tar.xz
          echo '32412a003d6868515b9813590e73f9738ef38c3424b6d8538f890ccf53c5903e  /tmp/winzard-doc-impl.tar.xz' | sha256sum --check --strict
          tar -xJf /tmp/winzard-doc-impl.tar.xz -C "$GITHUB_WORKSPACE"
          cp /tmp/active-verify.yml .github/workflows/verify.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'Implementation source is already applied.'
            exit 0
          fi
          git commit -m 'feat: implement project documentation and AI delivery'
          git push origin "HEAD:agent/project-documentation-implementation"
