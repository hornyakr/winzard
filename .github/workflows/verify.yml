name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_URL: http://localhost:3000
      APP_NAME: Winzard Reference
      APP_STAGE: local
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard Reference

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate reference route types
        run: pnpm typegen

      - name: Type-check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Verify deployed project documentation contract
        run: pnpm verify:documentation

      - name: Verify routing inventory and generated route documentation
        run: pnpm verify:routing

      - name: Verify controller and delivery contracts
        run: pnpm verify:delivery

      - name: Verify HTTP-kernel lifecycle contracts
        run: pnpm verify:kernel

      - name: Verify template, view and presentation contracts
        run: pnpm verify:views

      - name: Verify configuration contracts and secret hygiene
        run: pnpm verify:configuration

      - name: Run reference capability and architecture checks
        run: pnpm forge check --project apps/reference

      - name: Build minimal template without optional infrastructure
        run: pnpm verify:minimal-template

      - name: Build reference application
        run: pnpm build

      - name: Run reference E2E smoke tests
        run: pnpm test:e2e:reference

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_DB: winzard
          POSTGRES_USER: winzard
          POSTGRES_PASSWORD: winzard_dev_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winzard -d winzard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      APP_URL: http://localhost:3000
      APP_NAME: Winzard Webapp CI
      APP_STAGE: local
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard Webapp CI
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: 10
      DATABASE_CONNECTION_TIMEOUT_MS: 5000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check webapp capabilities
        run: pnpm forge check --project templates/webapp

      - name: Validate database environment
        run: pnpm forge env:check --project templates/webapp

      - name: Validate Prisma schema
        run: pnpm db:validate:webapp

      - name: Generate Prisma Client
        run: pnpm db:generate:webapp

      - name: Type-check and build webapp template
        run: pnpm verify:webapp-template

      - name: Deploy database migrations
        run: pnpm db:migrate:deploy:webapp
