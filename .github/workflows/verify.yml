name: Verify
on: [push, pull_request]
permissions: { contents: write }
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env: { POSTGRES_DB: winzard, POSTGRES_USER: winzard, POSTGRES_PASSWORD: winzard_dev_only }
        ports: [5432:5432]
        options: --health-cmd "pg_isready -U winzard -d winzard" --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      APP_URL: http://127.0.0.1:3000
      APP_NAME: Winzard
      LOG_LEVEL: error
      NEXT_PUBLIC_APP_NAME: Winzard
      DATABASE_URL: postgresql://winzard:winzard_dev_only@127.0.0.1:5432/winzard?schema=public
      DATABASE_POOL_MAX: 10
      DATABASE_CONNECTION_TIMEOUT_MS: 5000
      AUTH_SECRET: ci-only-secret-that-is-at-least-thirty-two-characters
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with: { version: 11.13.1 }
      - uses: actions/setup-node@v6
        with: { node-version-file: .node-version }
      - id: lock
        run: test -f pnpm-lock.yaml && echo 'present=true' >> "$GITHUB_OUTPUT" || echo 'present=false' >> "$GITHUB_OUTPUT"
      - run: pnpm install --no-frozen-lockfile
      - if: github.event_name == 'push' && steps.lock.outputs.present == 'false'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore: generate pnpm lockfile'
          git push
      - run: pnpm db:validate
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm verify
